<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="main.css">
    <title>Calculadora Saudavel</title>
</head>
<body>
    
    <main>
        <h1 class="texttopo">Faça o cálculo do seu IMC</h1>
            <div class="blocopai">
            <form>
                <div class="campo-grupo">
                    <label for="Nome">Nome</label>
                    <input class="Formulario" id="Nome" placeholder="Digite seu nome">
                    <label for="Altura">Idade</label>
                    <input class="Formulario" id="Idade" placeholder="Digite sua idade">
                </div>
                
                <div class="campo-grupo">
                    <label for="Peso">Peso</label>
                    <input class="Formulario"  id="Peso" placeholder="Digite seu peso em kg">
                    <label for="Altura">Altura</label>
                    <input class="Formulario" id="Altura" placeholder="Digite sua altura em cm">
                </div>

                
                <div class="campo-grupo2">
                    <p>Sexo</p>
                    <label for="Feminino"><input id="Feminino" name="Sexo" type="radio" value="Feminino">Feminino</label>
                    <label for="Masculino"><input id="Masculino" name="Sexo" type="radio" value="Masculino">Masculino</label>   
                </div>

                <div class="campo-grupo3">
                    <p>Nível de atividade fisíca</p>
                    <label for="Nenhum"><input id="Nenhum" name="ATV" type="radio" value="Nenhum">Nenhum</label>
                    <label for="Leve"><input id="Leve" name="ATV" type="radio" value="Leve">Leve</label>
                    <label for="Moderada"><input id="Moderada" name="ATV" type="radio" value="Moderada">Moderada</label>
                    <label for="Alta"><input id="Alta" name="ATV" type="radio" value="Alta">Alta</label>
                </div>

                <div class="campo-grupo4">
                    <p>Objetivo pessoal</p>
                    <label for="Emagrecimento"><input id="Emagrecimento" name="OBJ" type="radio" value="Emagrecimento">Emagrecimento</label>
                    <label for="Manutenção"><input id="Manutenção" name="OBJ" type="radio" value="Manutenção">Manutenção</label>
                    <label for="Ganho de massa"><input id="Ganho de massa" name="OBJ" type="radio" value="Ganho de massa">Ganho de massa</label> 
                </div>
                <div class="botoes">
                    <button class="bntform" type="button" id="botao">Calcular</button>
                    <button class="bntform" type="reset" id="botao">Limpar</button>
                </div> 
            </form>


            <div class="resposta">
                <p id="resultadoimc"></p>
                <p id="resultadotmb"></p>
                <p id="resultadogetd"></p>
                <p id="resultadoajuste"></p>
                <p id="resultadomacrop"></p>
        </div>   
        </div>
    </main>
    <footer>

    </footer>
    
    <script src="dadostest.js"></script>

</body>
</html>
